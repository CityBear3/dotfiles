# ==========================
# General
# ==========================

# Prefix: Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 256色対応
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# escキーの遅延を解消
set -sg escape-time 0

# ウィンドウとペインのインデックスを1から開始
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じたときに番号を詰める
set -g renumber-windows on

# マウス操作を有効化
set -g mouse on

# ==========================
# Pane: 移動 (vim風)
# ==========================

# prefix + h/j/k/l でペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ==========================
# Pane: リサイズ (vim風)
# ==========================

# prefix + H/J/K/L でペインリサイズ (5セル単位)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ==========================
# Pane: 作成 (split)
# ==========================

# prefix + | で水平分割 (カレントディレクトリを引き継ぐ)
bind | split-window -h -c "#{pane_current_path}"
# prefix + - で垂直分割 (カレントディレクトリを引き継ぐ)
bind - split-window -v -c "#{pane_current_path}"

# ==========================
# Window: 作成・移動
# ==========================

# prefix + c で新規ウィンドウ (カレントディレクトリを引き継ぐ)
bind c new-window -c "#{pane_current_path}"

# prefix + n/p でウィンドウ移動 (デフォルトと同じ)
bind n next-window
bind p previous-window

# prefix + Ctrl+h / Ctrl+l でウィンドウ移動
bind -r C-h previous-window
bind -r C-l next-window

# ==========================
# Copy mode (vi風)
# ==========================

setw -g mode-keys vi

# prefix + v でコピーモード開始
bind v copy-mode

# コピーモード内でvi風の操作
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ==========================
# Appearance
# ==========================

# ペインの枠線を背景に溶け込ませる
set -g pane-border-style "fg=#2d2f2b,bg=#2d2f2b"
set -g pane-active-border-style "fg=#888888,bg=#2d2f2b"

set -g status-style "fg=#888888,bg=#646862"
set -g status-left-style "fg=#888888,bg=#646862"
set -g status-right-style "fg=#888888,bg=#646862"
set -g window-status-current-style "fg=#cccccc,bg=#646862"
set -g window-status-style "fg=#888888,bg=#646862"

# ペインが1つに戻ったらpane-border-statusを非表示にする
set-hook -g after-kill-pane 'if-shell "[ #{window_panes} -le 1 ]" "set pane-border-status off" ""'
set-hook -g pane-exited    'if-shell "[ #{window_panes} -le 1 ]" "set pane-border-status off" ""'

# ==========================
# その他便利設定
# ==========================

# main-verticalレイアウトの左ペイン幅
set -g main-pane-width '75%'

# prefix + m でmain-verticalレイアウトに切り替え (左ペイン大)
bind m select-layout main-vertical

# prefix + M で現在のペインをメイン位置 (ペイン1) にスワップ
bind M swap-pane -t 1

# prefix + r で設定リロード
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# prefix + x でペイン削除 (確認あり、デフォルト)
# prefix + X でウィンドウ削除 (確認あり)
bind X confirm-before -p "kill-window #W? (y/n)" kill-window
